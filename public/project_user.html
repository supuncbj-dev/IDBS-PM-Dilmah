<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project check-in App</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
    .fade-in { animation: fadeIn 0.3s ease-in-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body class="antialiased text-gray-800 min-h-screen flex flex-col relative">

  <header id="main-header" class="bg-white border-b border-gray-200 px-6 py-4 hidden justify-between items-center z-40 sticky top-0 shadow-sm">
    <div class="flex items-center gap-2">
      <div class="w-8 h-8 rounded bg-emerald-600 flex items-center justify-center text-white font-bold">PU</div>
      <h1 class="text-xl font-bold tracking-tight text-gray-900">Project check-in App</h1>
    </div>
    <div class="flex gap-3 items-center">
       <span id="logged-in-name" class="text-sm font-bold text-gray-700"></span>
       <button onclick="logout()" class="text-xs bg-gray-100 text-gray-600 px-3 py-1.5 rounded hover:bg-gray-200 font-medium">Logout</button>
    </div>
  </header>

  <main class="flex-1 overflow-auto" id="app-container"></main>

  <script>
    const todayStr = new Date().toISOString().split('T')[0];

    // --- STATE ---
    let defaultState = {
      view: 'PROJECT_USER', cmdSub: 'tasks', repSub: 'consolidated', repSelectedProj: null,
      projectUser: '',
      projects: [], tasks: [], users: []
    };
    
    // Read shared state from the Super User interactive_demo
    let state = JSON.parse(localStorage.getItem('pcc_state')) || defaultState;
    
    // Auto-repair legacy local storage data
    if(!state.auditLog) state.auditLog = [];
    if(!state.users || state.users.length === 0) state.users = [{ name: 'Bob', email: 'bob@corp.com', mobile: '', role: 'PROJECT_USER', password: 'Project123' }];
    state.users.forEach(u => {
       if(u.name === 'Alice' && !u.role) u.role = 'SUPER_USER';
       if(!u.role) u.role = 'PROJECT_USER';
       if(!u.password) {
          if(u.role === 'SUPER_USER') u.password = 'admin123';
          else if(u.role === 'VIEWER') u.password = 'viewer123';
          else u.password = 'Project123';
       }
    });
    if(!state.users.find(u => u.email === 'bob@corp.com')) {
       state.users.push({ name: 'Bob', email: 'bob@corp.com', mobile: '+1 555-0202', role: 'PROJECT_USER', password: 'Project123' });
    }
    if(!state.users.find(u => u.email === 'david@corp.com')) {
       state.users.push({ name: 'David', email: 'david@corp.com', mobile: '+1 555-0404', role: 'VIEWER', password: 'viewer123' });
    }

    state.view = 'PROJECT_USER'; // Force view
    
    function persistState() { localStorage.setItem('pcc_state', JSON.stringify(state)); }

    window.logout = function() {
       sessionStorage.removeItem('pcc_pu_logged_in');
       render();
    }

    window.handleLogin = function(e) {
      e.preventDefault();
      const email = document.getElementById('login-email').value.trim();
      const pwd = document.getElementById('login-pwd').value.trim();
      const u = state.users.find(x => x.email === email && x.password === pwd && x.role === 'PROJECT_USER');
      if(u) {
         sessionStorage.setItem('pcc_pu_logged_in', u.name);
         logAction('USER_LOGIN', `Project User ${u.name} logged in.`);
         render();
      } else {
         alert("Access Denied. Invalid credentials or you are not a Project User.");
      }
    }

    function logAction(action, details) {
       const u = sessionStorage.getItem('pcc_pu_logged_in') || 'System';
       state.auditLog.unshift({ timestamp: new Date().toLocaleString(), user: u, action: action, details: details });
       if(state.auditLog.length > 500) state.auditLog.pop(); // keep last 500
       persistState();
    }

    window.projectCheckIn = function(taskId, statusKey) {
      let task = state.tasks.find(t => t.id === taskId);
      if(task) {
        task.status = statusKey;
        if(statusKey === 'COMPLETED') task.completedAt = todayStr; else task.completedAt = null;
        let cmtProject = document.getElementById(`cmt-${taskId}`);
        if(cmtProject) task.comment = cmtProject.value;
        logAction('TASK_CHECKIN', `Project check-in for task ${task.name} to ${statusKey}`);
        render();
      }
    }

    function renderLogin() {
      return `
        <div class="min-h-[80vh] flex items-center justify-center fade-in p-4">
          <div class="bg-white p-8 rounded-2xl shadow-xl border border-gray-100 max-w-sm w-full text-center">
            <div class="w-12 h-12 rounded-lg bg-emerald-600 text-white font-bold text-xl flex items-center justify-center mx-auto mb-4 shadow-sm">PU</div>
            <h2 class="text-2xl font-bold mb-2">Project Agent Portal</h2>
            <p class="text-sm text-gray-500 mb-8">Login to access your assigned tasks</p>
            <form onsubmit="handleLogin(event)" class="space-y-4">
              <input type="email" id="login-email" required placeholder="Project User Email" class="w-full border border-gray-300 rounded-lg p-3 text-sm outline-none focus:border-emerald-500 transition-colors" value="bob@corp.com" />
              <input type="password" id="login-pwd" required placeholder="Password" class="w-full border border-gray-300 rounded-lg p-3 text-sm outline-none focus:border-emerald-500 transition-colors" value="Project123" />
              <button type="submit" class="w-full bg-emerald-600 text-white font-bold py-3 rounded-lg shadow-md hover:bg-emerald-700 transition-all hover:scale-[1.02]">Login to Project App</button>
            </form>
          </div>
        </div>
      `;
    }

    function render() {
      persistState();
      const container = document.getElementById('app-container');
      const header = document.getElementById('main-header');
      const loggedInUser = sessionStorage.getItem('pcc_pu_logged_in');

      if (!loggedInUser) {
         header.classList.remove('flex');
         header.classList.add('hidden');
         container.innerHTML = renderLogin();
         return;
      }

      header.classList.remove('hidden');
      header.classList.add('flex');
      document.getElementById('logged-in-name').innerText = `${loggedInUser} (Project)`;
      state.projectUser = loggedInUser;
      
      let tasksHTML = '';
      tasksHTML = state.tasks.filter(t => t.assignee === state.projectUser).map(t => {
        const p = state.projects.find(pr => pr.id === t.projectId);
        const btns = [{ k: 'NOT_STARTED', l: 'to-do', a: 'bg-gray-200 text-gray-800' },{ k: 'IN_PROGRESS', l: 'in-progress', a: 'bg-blue-500 text-white shadow-md' },{ k: 'COMPLETED', l: 'completed', a: 'bg-emerald-500 text-white shadow-md' }].map(s => `<button class="py-3 rounded-xl text-xs font-medium w-full transition-colors ${t.status === s.k ? s.a : 'bg-gray-50 text-gray-500 border'}" onclick="projectCheckIn('${t.id}', '${s.k}')">${s.l}</button>`).join('');

        return `
          <div class="bg-white p-5 rounded-3xl shadow-sm border border-gray-100 mb-4 transition-transform ${t.status==='COMPLETED'?'opacity-70':''}">
            <div class="flex justify-between items-start mb-1"><div class="text-[10px] bg-emerald-50 text-emerald-700 px-2 py-1 rounded font-bold">${p?.name || 'Unknown Project'}</div><div class="text-[10px] text-gray-400 font-medium">${t.startDate} ➔ ${t.endDate}</div></div>
            <h3 class="font-bold text-lg text-gray-900 mb-4 mt-2">${t.name}</h3><div class="grid grid-cols-3 gap-2 mb-4">${btns}</div>
            <div class="bg-gray-50 rounded-xl p-3 border border-gray-100">
               <label class="text-xs font-bold text-gray-500 block mb-1">Project Notes / Comments</label>
               <textarea id="cmt-${t.id}" class="w-full bg-transparent resize-none outline-none text-sm text-gray-700 placeholder-gray-400" rows="2" placeholder="Write updates here...">${t.comment || ''}</textarea>
               <div class="flex justify-between items-center mt-2"><span class="text-xs font-medium text-emerald-600">${t.completedAt ? 'Completed: ' + t.completedAt : ''}</span><button onclick="projectCheckIn('${t.id}', '${t.status}')" class="bg-emerald-600 text-white text-xs px-3 py-1.5 rounded-lg font-medium shadow-sm hover:bg-emerald-700">Save Update</button></div>
            </div>
          </div>
        `;
      }).join('');

      const content = `
        <div class="max-w-md mx-auto bg-gray-50 min-h-[700px] border-8 border-gray-200 rounded-[2.5rem] shadow-2xl relative overflow-hidden flex flex-col mt-8">
          <div class="bg-white px-6 py-5 border-b shadow-sm">
            <h2 class="text-xl font-extrabold mb-2">My Project Tasks</h2>
          </div>
          <div class="px-4 py-6 overflow-y-auto flex-1 pb-24">${tasksHTML || '<p class="text-center text-sm text-gray-500 mt-10">No tasks assigned to you right now.</p>'}</div>
        </div>
      `;

      container.innerHTML = `<div class="p-6 md:p-8 max-w-7xl mx-auto h-PUll fade-in">${content}</div>`;
    }

    // Sync across tabs! If Super User updates interactive_demo.html, this page will auto-update!
    window.addEventListener('storage', (e) => {
      if(e.key === 'pcc_state') {
        state = JSON.parse(e.newValue);
        state.view = 'PROJECT_USER'; // keep this tab in Project mode
        render();
      }
    });

    render();
  </script>
  <!-- Bottom Right Logo -->
  <img src="logo.png" alt="Company Logo" class="fixed bottom-4 right-4 h-16 w-auto z-[100] opacity-90 shadow-md rounded-md bg-white p-1 pointer-events-none" />
</body>
</html>
