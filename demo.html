<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project Command Center</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    body {
      font-family: 'Inter', sans-serif;
      background-color: #f9fafb;
    }
    .striped-bg {
      background-image: repeating-linear-gradient(45deg, transparent, transparent 10px, rgba(239, 68, 68, 0.4) 10px, rgba(239, 68, 68, 0.4) 20px);
    }
    /* Simple dark mode detection */
    @media (prefers-color-scheme: dark) {
      body { background-color: #09090b; color: #ededed; }
      .bg-white { background-color: #18181b !important; border-color: #27272a !important; }
      .text-gray-900 { color: #f4f4f5 !important; }
      .text-gray-500 { color: #a1a1aa !important; }
    }
  </style>
</head>
<body class="antialiased min-h-screen">
  
  <nav class="fixed top-0 w-full bg-white border-b border-gray-200 z-50 px-4 py-3 flex justify-between items-center shadow-sm">
    <div class="text-xl font-bold tracking-tight text-blue-600">Command Center</div>
    <div class="flex gap-4 items-center">
      <span class="p-2 cursor-pointer rounded-full hover:bg-gray-100 dark:hover:bg-zinc-800">🔔</span>
      <div class="w-8 h-8 rounded-full bg-gradient-to-tr from-blue-500 to-purple-500"></div>
    </div>
  </nav>

  <main class="pt-24 pb-16 px-4 max-w-7xl mx-auto">
    <div class="py-6">
      <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
        <div>
          <h1 class="text-3xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-gray-900 to-gray-500">Global Portfolio</h1>
          <p class="text-gray-500 mt-1">Overview of all active Engineering and CAPEX projects</p>
        </div>
        <div class="flex gap-2">
          <button class="px-4 py-2 rounded-full bg-black text-white font-medium shadow-md hover:scale-105 transition-transform">All Projects</button>
          <button class="px-4 py-2 rounded-full bg-white text-gray-700 shadow hover:bg-gray-50 transition-colors">Red Flags</button>
          <button onclick="document.getElementById('mobile-demo').scrollIntoView({behavior: 'smooth'})" class="px-4 py-2 rounded-full bg-blue-50 text-blue-700 shadow hover:bg-blue-100 transition-colors">View Mobile Check-in</button>
        </div>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="projects-container">
        <!-- Rendered by JS -->
      </div>
    </div>
    
    <hr class="my-16 border-gray-200 dark:border-zinc-800" id="mobile-demo">
    
    <div class="py-6">
      <div class="text-center mb-8">
        <h2 class="text-2xl font-bold">Mobile Check-in View</h2>
        <p class="text-gray-500">How field engineers see their tasks</p>
      </div>
      
      <!-- Mobile Mockup Frame -->
      <div class="max-w-md mx-auto bg-gray-50 dark:bg-zinc-950 h-[800px] rounded-[3rem] shadow-2xl border-8 border-gray-200 dark:border-zinc-800 overflow-hidden relative">
        <div class="px-4 pt-12 pb-6">
          <h2 class="text-2xl font-bold mb-1 text-gray-900">My Tasks</h2>
          <p class="text-sm text-gray-500">Site B Server Expansion</p>
        </div>

        <div class="px-4 space-y-4" id="tasks-container">
           <!-- Rendered by JS -->
        </div>

        <!-- Floating Bottom Navigation -->
        <div class="absolute bottom-0 left-0 w-full bg-white/80 dark:bg-zinc-900/80 backdrop-blur-md border-t border-gray-200 dark:border-zinc-800 p-4">
          <div class="flex justify-around">
            <div class="flex flex-col items-center text-gray-400">
              <span class="text-xl mb-1">📊</span>
              <span class="text-[10px] font-medium uppercase tracking-wider">Dashboard</span>
            </div>
            <div class="flex flex-col items-center text-blue-500">
              <span class="text-xl mb-1">📋</span>
              <span class="text-[10px] font-medium uppercase tracking-wider">My Tasks</span>
            </div>
            <div class="flex flex-col items-center text-gray-400">
              <span class="text-xl mb-1">📷</span>
              <span class="text-[10px] font-medium uppercase tracking-wider">Scan</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script>
    const MOCK_PROJECTS = [
      { id: '1', name: 'Alpha Reactor Setup', type: 'RND', plannedDays: 100, actualDays: 115, manager: 'Alice' },
      { id: '2', name: 'Site B Server Expansion', type: 'CAPEX', plannedDays: 60, actualDays: 58, manager: 'Bob' },
      { id: '3', name: 'Hydraulics Redesign', type: 'RND', plannedDays: 45, actualDays: 60, manager: 'Charlie' },
    ];

    const MOCK_TASKS = [
      { id: 't1', name: 'Material Inspection', status: 'IN_PROGRESS' },
      { id: 't2', name: 'Site Clearing', status: 'COMPLETED' },
      { id: 't3', name: 'Foundation Pouring', status: 'BLOCKED' },
    ];

    document.getElementById('projects-container').innerHTML = MOCK_PROJECTS.map(proj => {
      const deviation = (proj.actualDays - proj.plannedDays) / proj.plannedDays;
      const deviationPercent = (deviation * 100).toFixed(1);
      
      let alertState = 'green';
      let statusText = 'On Track';
      let statusColor = 'text-emerald-500';
      if (deviation > 0.1) { alertState = 'red'; statusText = `+${deviationPercent}% Overrun`; statusColor = 'text-red-500'; }
      else if (deviation > 0) { alertState = 'yellow'; statusText = `+${deviationPercent}% Overrun`; statusColor = 'text-amber-500'; }

      const plannedWidth = Math.min((proj.plannedDays / Math.max(proj.plannedDays, proj.actualDays)) * 100, 100);
      const overrunWidth = alertState !== 'green' ? Math.min((proj.actualDays - proj.plannedDays) / Math.max(proj.plannedDays, proj.actualDays) * 100, 100) : 0;

      const typeBadge = proj.type === 'RND' 
        ? `<span class="text-xs font-bold px-2 py-1 rounded-md mb-2 inline-block bg-purple-100 text-purple-700">Tech R&D</span>`
        : `<span class="text-xs font-bold px-2 py-1 rounded-md mb-2 inline-block bg-blue-100 text-blue-700">CAPEX Build</span>`;

      return `
        <div class="bg-white rounded-2xl p-6 shadow-sm border border-gray-100 hover:shadow-lg transition-all duration-300">
          <div class="flex justify-between items-start mb-4">
            <div>
              ${typeBadge}
              <h3 class="text-lg font-bold text-gray-900 truncate pr-2">${proj.name}</h3>
            </div>
            <div class="w-8 h-8 rounded-full bg-gray-200 flex items-center justify-center font-bold text-xs text-gray-600 shrink-0">${proj.manager[0]}</div>
          </div>
          <div class="space-y-2 mt-6">
            <div class="flex justify-between text-sm">
              <span class="text-gray-500">Timeline Progress</span>
              <span class="font-semibold ${statusColor}">${statusText}</span>
            </div>
            <div class="h-3 w-full bg-gray-100 rounded-full flex overflow-hidden">
              <div class="h-full bg-blue-500" style="width: ${plannedWidth}%"></div>
              ${alertState === 'red' ? `<div class="h-full bg-red-500 striped-bg" style="width: ${overrunWidth}%"></div>` : ''}
              ${alertState === 'yellow' ? `<div class="h-full bg-amber-400" style="width: ${overrunWidth}%"></div>` : ''}
            </div>
            <div class="flex justify-between text-xs text-gray-400 pt-1">
              <span>Planned: ${proj.plannedDays}d</span>
              <span>Actual: <b class="text-gray-700 dark:text-gray-300">${proj.actualDays}d</b></span>
            </div>
          </div>
        </div>
      `;
    }).join('');

    const statusMap = {
      'NOT_STARTED': { label: 'Not Started', activeClass: 'bg-gray-200 text-gray-800' },
      'IN_PROGRESS': { label: 'In Progress', activeClass: 'bg-blue-500 text-white shadow-lg shadow-blue-500/30' },
      'BLOCKED': { label: 'Blocked', activeClass: 'bg-red-500 text-white shadow-lg shadow-red-500/30' },
      'COMPLETED': { label: 'Completed', activeClass: 'bg-emerald-500 text-white shadow-lg shadow-emerald-500/30' }
    };

    document.getElementById('tasks-container').innerHTML = MOCK_TASKS.map(task => {
      const buttons = Object.entries(statusMap).map(([statusKey, config]) => {
        const isActive = task.status === statusKey;
        const className = isActive 
          ? config.activeClass 
          : 'bg-gray-50 text-gray-500 hover:bg-gray-100';
          
        return `<button class="py-3 rounded-xl text-sm font-medium transition-colors ${className}">${config.label}</button>`;
      }).join('');

      return `
        <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100">
          <h3 class="font-semibold text-lg text-gray-900 mb-4">${task.name}</h3>
          <div class="grid grid-cols-2 gap-2">
            ${buttons}
          </div>
        </div>
      `;
    }).join('');
  </script>
</body>
</html>
